# Минимальный workflow (Schedule + End) — template для старта
# Импорт: POST /console/api/apps/imports { mode: 'yaml-content', yaml_content: <этот файл> }

app:
  description: 'Template: минимальный workflow с Schedule Trigger'
  icon: 🚀
  icon_background: '#FFEAD5'
  icon_type: emoji
  mode: workflow
  name: My Workflow
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.6.0

workflow:
  conversation_variables: []
  environment_variables:
    - name: EXAMPLE_VAR
      value_type: string
      value: 'hello'
      description: ''
    - name: SECRET_VAR
      value_type: secret
      value: 'your-secret-here'
      description: ''
  features:
    file_upload: { enabled: false }
    opening_statement: ''
    retriever_resource: { enabled: false }
    sensitive_word_avoidance: { enabled: false }
    speech_to_text: { enabled: false }
    suggested_questions: []
    suggested_questions_after_answer: { enabled: false }
    text_to_speech: { enabled: false, language: '', voice: '' }
  graph:
    edges:
      - data: { isInIteration: false, isInLoop: false, sourceType: custom, targetType: custom }
        id: '1749000000001-source-1749000000002-target'
        source: '1749000000001'
        sourceHandle: source
        target: '1749000000002'
        targetHandle: target
        type: custom
        zIndex: 0
    nodes:
      - data:
          title: Schedule Trigger
          type: trigger-schedule
          cron_expression: '0 5 * * *'    # 8:00 МСК в UTC
          frequency: daily
          mode: cron
          timezone: UTC
          visual_config:
            monthly_days: [1]
            on_minute: 0
            time: '8:00 AM'
            weekdays: [sun]
        height: 129
        id: '1749000000001'
        position: { x: 80, y: 282 }
        positionAbsolute: { x: 80, y: 282 }
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 242
      - data:
          title: End
          type: end
          outputs: []
        height: 89
        id: '1749000000002'
        position: { x: 400, y: 282 }
        positionAbsolute: { x: 400, y: 282 }
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 242
    viewport: { x: 0, y: 0, zoom: 1 }
  rag_pipeline_variables: []
